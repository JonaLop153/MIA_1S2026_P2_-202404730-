<div class="login-container">
  <h2>Iniciar Sesión</h2>
  
  <div class="form-group">
    <label>Usuario:</label>
    <input type="text" [(ngModel)]="usuario" placeholder="root" />
  </div>

  <div class="form-group">
    <label>Contraseña:</label>
    <input type="password" [(ngModel)]="password" placeholder="123" />
  </div>

  <div class="form-group">
    <label>ID Partición:</label>
    <input type="text" [(ngModel)]="idParticion" placeholder="301A" />
  </div>

  <button (click)="iniciarSesion()">Ingresar</button>

  <div *ngIf="mensaje" class="success">{{ mensaje }}</div>
  <div *ngIf="error" class="error">{{ error }}</div>
</div>
